<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма реєстрації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="registration-container">
        <form id="registrationForm">
            <h2>Форма реєстрації</h2>

            <div class="form-group">
                <label for="name">Ім'я:</label>
                <input type="text" id="name" name="name">
                <span class="error" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" name="email">
                <span class="error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password">
                <span class="error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Повторіть пароль:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
                <span class="error" id="confirmPasswordError"></span>
            </div>

            <div class="form-group">
                <label for="age">Вік:</label>
                <input type="number" id="age" name="age">
                <span class="error" id="ageError"></span>
            </div>

            <div class="form-group">
                <label for="group">Група студентів:</label>
                <select id="group" name="group">
                    <option value="">-- Виберіть групу --</option>
                    <option value="КН-21">КН-21</option>
                    <option value="КН-22">КН-22</option>
                    <option value="КН-23">КН-23</option>
                    <option value="КН-31">КН-31</option>
                </select>
                <span class="error" id="groupError"></span>
            </div>

            <button type="submit">Зареєструватися</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
