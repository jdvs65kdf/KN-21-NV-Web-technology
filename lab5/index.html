<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 5: Маніпуляція DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Маніпуляція DOM та обробка подій</h1>
    </header>

    <main>
        <section>
            <h2>Зміна вмісту елемента</h2>
            <p id="text-to-change">Початковий текст, який буде змінено.</p>
            <button id="change-text-btn">Змінити текст</button>
        </section>

        <hr>

        <section>
            <h2>Обробка подій</h2>
            <button id="hover-btn">Наведіть курсор на мене</button>
            <p>Наведіть курсор на кнопку, щоб побачити зміну стилю.</p>
        </section>

        <hr>

        <section>
            <h2>Додавання нового елемента</h2>
            <button id="add-element-btn">Додати елемент</button>
            <div id="elements-container">
                </div>
        </section>

        <hr>

        <section>
            <h2>Додаткове завдання</h2>
            <button id="variant-btn">Натисніть 5 разів!</button> 
            <p id="click-counter">Кліків: 0</p>
        </section>
    </main>

    <footer>
        <p>Лабораторна робота 5. JavaScript, DOM, події.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
