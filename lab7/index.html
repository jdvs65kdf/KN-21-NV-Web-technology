<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота: CSS Анімації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Завдання 1 -->
    <section>
        <h2>Завдання 1: Кнопка</h2>
        <button class="button">Наведи та натисни</button>
    </section>

    <!-- Завдання 2 -->
    <section>
        <h2>Завдання 2: Розгортання тексту</h2>
        <div class="content-wrapper">
            <div class="content">
                Це прихований текст, який плавно з'являється при наведенні на батьківський контейнер. Використання max-height дозволяє створити ефект розгортання.
            </div>
        </div>
    </section>

    <!-- Завдання 3 -->
    <section>
        <h2>Завдання 3: Рух блоку</h2>
        <div class="box"></div>
    </section>

    <!-- Індивідуальне завдання (Варіант 4) -->
    <section>
        <h2>Індивідуальне завдання (Варіант 4)</h2>
        <button id="moveBtn">Рухати коло</button>
        <div id="circle" class="circle"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
